<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAPPR — Output</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let polys = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Double-click → fullscreen
document.addEventListener('dblclick', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});

// ─── Communication: BroadcastChannel + localStorage fallback ──
let bc = null;
try { bc = new BroadcastChannel('videomapping'); } catch(e) {}

function applyUpdate(data) {
  if (Array.isArray(data)) polys = data;
}

// BroadcastChannel
if (bc) {
  bc.onmessage = e => {
    if (e.data.type === 'update') applyUpdate(e.data.polys || e.data.polygons);
    if (e.data.type === 'ping')   bc.postMessage({ type:'ready' });
  };
}

// localStorage fallback — poll every 300ms + signal editor we're open
function lsPing() {
  try {
    // Signal editor
    localStorage.setItem('mappr_ready', Date.now());
    // Read state
    const raw = localStorage.getItem('mappr_state');
    if (raw) applyUpdate(JSON.parse(raw));
  } catch(e) {}
}
lsPing();
setInterval(lsPing, 300);

window.addEventListener('beforeunload', () => {
  if (bc) bc.postMessage({ type:'closed' });
  try { localStorage.setItem('mappr_closed', Date.now()); } catch(e) {}
});

// ─── Texture renderers ───────────────────────────────────────
function drawTex(c2, id, w, h, t, polyId) {
  if (w<=0||h<=0) return;
  switch(id) {
    case 'lava':    texLava(c2,w,h,t);    break;
    case 'ocean':   texOcean(c2,w,h,t);   break;
    case 'neon':    texNeon(c2,w,h,t);    break;
    case 'fire':    texFire(c2,w,h,t);    break;
    case 'noise':   texNoise(c2,w,h,t);   break;
    case 'rainbow': texRainbow(c2,w,h,t); break;
    case 'stars':   texStars(c2,w,h,t);   break;
    case 'sweep':   texSweep(c2,w,h,t);   break;
  }
}

function mkPix(fn, w, h, scale) {
  const sw=Math.max(1,Math.ceil(w/scale)), sh=Math.max(1,Math.ceil(h/scale));
  const id=new ImageData(sw,sh); fn(id.data,sw,sh);
  const t=document.createElement('canvas'); t.width=sw; t.height=sh;
  t.getContext('2d').putImageData(id,0,0); return t;
}

function texLava(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw,ny=y/sh;
      let v=(Math.sin(nx*8+t)+Math.sin(ny*6+t*1.3)+Math.sin((nx+ny)*5+t*.7)+Math.sin(Math.sqrt(nx*nx+ny*ny)*7+t)+4)/8;
      const i=(y*sw+x)*4; d[i]=Math.min(255,v*310);d[i+1]=Math.max(0,v*80-40);d[i+2]=0;d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texOcean(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw,ny=y/sh;
      const v=(Math.sin(nx*6-t*1.2)*Math.cos(ny*4+t*.5)+Math.sin(nx*3+ny*5-t)*.5+2)/4;
      const i=(y*sw+x)*4; d[i]=0;d[i+1]=Math.min(255,v*120+60);d[i+2]=Math.min(255,v*200+80);d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texNeon(c2,w,h,t){
  const gs=Math.max(28,w/18), pulse=.5+.5*Math.sin(t*2);
  c2.fillStyle='#000'; c2.fillRect(0,0,w,h);
  c2.strokeStyle=`rgba(0,229,255,${.35+pulse*.4})`; c2.lineWidth=1;
  c2.shadowColor='#00e5ff'; c2.shadowBlur=6+pulse*10;
  for(let x=0;x<w+gs;x+=gs){const ox=(x+t*40)%(w+gs)-gs;c2.beginPath();c2.moveTo(ox,0);c2.lineTo(ox,h);c2.stroke();}
  for(let y=0;y<h+gs;y+=gs){const oy=(y+t*20)%(h+gs)-gs;c2.beginPath();c2.moveTo(0,oy);c2.lineTo(w,oy);c2.stroke();}
  c2.shadowBlur=0;
  const g=c2.createLinearGradient(0,h*.45,0,h);
  g.addColorStop(0,`rgba(168,85,247,${.35+pulse*.25})`);g.addColorStop(1,'rgba(0,0,0,0)');
  c2.fillStyle=g;c2.fillRect(0,h*.45,w,h);
}

function texFire(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const ny=1-y/sh,nx=x/sw,fl=Math.sin(nx*10+t*4)*.12+Math.sin(nx*5-t*3)*.09;
      const heat=Math.max(0,Math.min(1,ny+fl));
      let r=0,g=0,b=0;
      if(heat>.9){r=255;g=255;b=Math.round((heat-.9)*2550);}
      else if(heat>.6){r=255;g=Math.round((heat-.6)/.3*200);}
      else if(heat>.3){r=Math.round((heat-.3)/.3*255);}
      const i=(y*sw+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texNoise(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    const s=Math.floor(t*30);
    for(let i=0;i<d.length;i+=4){const v=Math.abs((Math.sin(i*127.1+s)*43758.5)%1)*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  },w,h,3);
  c2.imageSmoothingEnabled=false; c2.drawImage(tmp,0,0,w,h); c2.imageSmoothingEnabled=true;
}

function texRainbow(c2,w,h,t){
  const g=c2.createLinearGradient(0,0,w,h);
  for(let i=0;i<=6;i++) g.addColorStop(i/6,`hsl(${(i*60+t*55)%360},100%,55%)`);
  c2.fillStyle=g; c2.fillRect(0,0,w,h);
}

function texStars(c2,w,h,t){
  c2.fillStyle='#000'; c2.fillRect(0,0,w,h);
  for(let i=0;i<250;i++){
    const s=i*1234.5;
    const sx=((Math.sin(s)*.5+.5)*w*5+t*(18+i%25)*1.5)%w;
    const sy=(Math.cos(s*1.3)*.5+.5)*h;
    c2.fillStyle=`rgba(255,255,255,${.4+.6*Math.abs(Math.sin(t*1.5+i))})`;
    c2.beginPath();c2.arc(sx,sy,.4+(i%5)*.5,0,Math.PI*2);c2.fill();
  }
}

function texSweep(c2,w,h,t){
  const x=(t*.28%1)*(w+200)-100;
  const bg=c2.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,`hsl(${(t*28)%360},65%,14%)`);bg.addColorStop(1,`hsl(${(t*28+130)%360},65%,6%)`);
  c2.fillStyle=bg;c2.fillRect(0,0,w,h);
  const g=c2.createLinearGradient(x-120,0,x+120,0);
  g.addColorStop(0,'rgba(168,85,247,0)');g.addColorStop(.3,'rgba(168,85,247,.85)');
  g.addColorStop(.5,'rgba(255,255,255,1)');g.addColorStop(.7,'rgba(0,229,255,.85)');g.addColorStop(1,'rgba(0,229,255,0)');
  c2.fillStyle=g;c2.fillRect(0,0,w,h);
}

// ─── Helpers ─────────────────────────────────────────────────
function bbox(pts){
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const x=Math.min(...xs),y=Math.min(...ys);
  return{x,y,w:Math.max(1,Math.max(...xs)-x),h:Math.max(1,Math.max(...ys)-y)};
}

// ─── Render loop ─────────────────────────────────────────────
const off=document.createElement('canvas');
const octx=off.getContext('2d');

function render(ts){
  const t=ts*.001;
  const cw=canvas.width, ch=canvas.height;
  if(off.width!==cw||off.height!==ch){off.width=cw;off.height=ch;}

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,cw,ch);

  polys.forEach(p=>{
    if(!p.visible||p.points.length<3) return;
    const bb=bbox(p.points);

    octx.clearRect(0,0,cw,ch);
    octx.save();
    octx.beginPath();
    p.points.forEach(([px,py],i)=>i===0?octx.moveTo(px,py):octx.lineTo(px,py));
    octx.closePath();
    octx.clip();
    octx.save();
    octx.translate(bb.x,bb.y);
    drawTex(octx,p.texture,bb.w,bb.h,t*p.speed,p.id);
    octx.restore();
    octx.restore();

    ctx.save();
    ctx.globalAlpha=p.opacity;
    ctx.globalCompositeOperation=p.blend;
    ctx.drawImage(off,0,0);
    ctx.restore();
  });

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
