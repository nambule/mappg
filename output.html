<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAPPG - Output</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let polys = [];
let bc = null;
const DEFAULT_TEXTURE_COLORS = {
  colorA: '#00e5ff',
  colorB: '#a855f7',
  colorBg: '#05070c',
};

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Double-click → fullscreen
document.addEventListener('dblclick', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});

// ─── Receive data from editor ────────────────────────────────
// Called directly by the editor via outWin.applyUpdate(data)
function applyUpdate(data) {
  if (Array.isArray(data)) polys = data;
}

// BroadcastChannel path for same-origin tabs/windows
try {
  bc = new BroadcastChannel('videomapping');
  bc.onmessage = ev => {
    if (ev.data?.type === 'update' && Array.isArray(ev.data.polys)) {
      polys = ev.data.polys;
    }
  };
  bc.postMessage({ type:'ready' });
} catch (e) {}

// localStorage fallback for browsers/setups where direct calls or channels fail
function readStoredState() {
  try {
    const raw = localStorage.getItem('mappg_state');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data)) polys = data;
  } catch (e) {}
}

readStoredState();

window.addEventListener('storage', e => {
  if (e.key === 'mappg_state') readStoredState();
});

// Signal readiness for setups that rely on storage events
try { localStorage.setItem('mappg_ready', String(Date.now())); } catch (e) {}

// Fallback: poll shared opener state directly every 300ms
// (works for file:// where messaging APIs may be restricted)
setInterval(() => {
  try {
    const state = window.opener?.mappgState;
    if (state?.polys) {
      polys = state.polys.map(p => ({
        id: p.id, points: p.points, texture: p.texture,
        opacity: p.opacity, speed: p.speed, density: p.density, blend: p.blend,
        pointIds: p.pointIds, segmentCurves: p.segmentCurves,
        segmentLinkIds: p.segmentLinkIds, segmentBezier: p.segmentBezier,
        colorA: p.colorA, colorB: p.colorB, colorBg: p.colorBg,
        scrollText: p.scrollText,
        rotation: p.rotation, tiltX: p.tiltX, tiltY: p.tiltY, scale: p.scale,
        offsetX: p.offsetX, offsetY: p.offsetY,
        visible: p.visible, color: p.color,
      }));
    }
  } catch(e) {}
}, 300);

window.addEventListener('beforeunload', () => {
  try { bc?.postMessage({ type:'closed' }); } catch (e) {}
  try { localStorage.setItem('mappg_closed', String(Date.now())); } catch (e) {}
});

// ─── Texture renderers ───────────────────────────────────────
function texturePalette(p) {
  return {
    a: p?.colorA || DEFAULT_TEXTURE_COLORS.colorA,
    b: p?.colorB || DEFAULT_TEXTURE_COLORS.colorB,
    bg: p?.colorBg || DEFAULT_TEXTURE_COLORS.colorBg,
  };
}

function textureDensity(p) {
  const n = Number(p?.density ?? 1);
  return Number.isFinite(n) ? Math.max(0.25, Math.min(3, n)) : 1;
}

function hexToRgb(hex) {
  const value = String(hex || '').trim();
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(value);
  if (m) {
    return { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) };
  }
  const rgb = /^rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)/i.exec(value);
  return rgb ? {
    r: Math.max(0, Math.min(255, Math.round(Number(rgb[1])))),
    g: Math.max(0, Math.min(255, Math.round(Number(rgb[2])))),
    b: Math.max(0, Math.min(255, Math.round(Number(rgb[3])))),
  } : { r:0,g:0,b:0 };
}

function mixColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  return `rgb(${Math.round(a.r + (b.r - a.r) * t)}, ${Math.round(a.g + (b.g - a.g) * t)}, ${Math.round(a.b + (b.b - a.b) * t)})`;
}

function alpha(hex, a) {
  const c = hexToRgb(hex);
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

function rand01(seed) {
  const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453123;
  return x - Math.floor(x);
}

function drawShard(c2, x, y, size, kind, color, rotation=0) {
  c2.save();
  c2.translate(x, y);
  c2.rotate(rotation);
  c2.fillStyle = color;
  c2.beginPath();
  if (kind === 0) {
    c2.rect(-size * .5, -size * .5, size, size);
  } else if (kind === 1) {
    c2.moveTo(0, -size * .6);
    c2.lineTo(size * .56, size * .42);
    c2.lineTo(-size * .56, size * .42);
    c2.closePath();
  } else {
    c2.moveTo(0, -size * .62);
    c2.lineTo(size * .48, 0);
    c2.lineTo(0, size * .62);
    c2.lineTo(-size * .48, 0);
    c2.closePath();
  }
  c2.fill();
  c2.restore();
}

function drawTex(c2, id, w, h, t, polyId, poly) {
  if (w<=0||h<=0) return;
  const pal = texturePalette(poly);
  const den = textureDensity(poly);
  switch(id) {
    case 'lava':    texLava(c2,w,h,t,pal);    break;
    case 'ocean':   texOcean(c2,w,h,t,pal);   break;
    case 'waves':   texSeaWaves(c2,w,h,t,pal,den); break;
    case 'eyes':    texEyes(c2,w,h,t,pal,den);    break;
    case 'fireworks': texFireworks(c2,w,h,t,pal,den); break;
    case 'neon':    texNeon(c2,w,h,t,pal);    break;
    case 'wire':    texWire(c2,w,h,t,pal,den);    break;
    case 'matrix':  texMatrix(c2,w,h,t,pal,den);  break;
    case 'checker': texChecker(c2,w,h,t,pal,den); break;
    case 'fire':    texFire(c2,w,h,t,pal);    break;
    case 'firecamp': texFirecamp(c2,w,h,t,pal,den); break;
    case 'noise':   texNoise(c2,w,h,t,pal);   break;
    case 'rainbow': texRainbow(c2,w,h,t,pal); break;
    case 'stars':   texStars(c2,w,h,t,pal,den);   break;
    case 'sweep':   texSweep(c2,w,h,t,pal);   break;
    case 'plasma':  texPlasma(c2,w,h,t,pal);  break;
    case 'squares': texSquares(c2,w,h,t,pal,den); break;
    case 'textscroll': texTextScroll(c2,w,h,t,pal,poly); break;
    case 'radar':   texRadar(c2,w,h,t,pal,den);   break;
    case 'stripes': texStripes(c2,w,h,t,pal,den); break;
    case 'marble':  texMarble(c2,w,h,t,pal);  break;
    case 'rings':   texRings(c2,w,h,t,pal,den);   break;
    case 'halftone': texHalftone(c2,w,h,t,pal,den); break;
    case 'chevrons': texChevrons(c2,w,h,t,pal,den); break;
    case 'beams':   texBeams(c2,w,h,t,pal,den);   break;
    case 'cascade': texCascade(c2,w,h,t,pal,polyId,den); break;
    case 'video':   texVideo(c2,w,h,polyId); break;
  }
}

function mkPix(fn, w, h, scale) {
  const sw=Math.max(1,Math.ceil(w/scale)), sh=Math.max(1,Math.ceil(h/scale));
  const id=new ImageData(sw,sh); fn(id.data,sw,sh);
  const t=document.createElement('canvas'); t.width=sw; t.height=sh;
  t.getContext('2d').putImageData(id,0,0); return t;
}

function texLava(c2,w,h,t,pal){
  const tmp=mkPix((d,sw,sh)=>{
    const ca = hexToRgb(pal.a), cb = hexToRgb(pal.b), bg = hexToRgb(pal.bg);
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw,ny=y/sh;
      let v=(Math.sin(nx*8+t)+Math.sin(ny*6+t*1.3)+Math.sin((nx+ny)*5+t*.7)+Math.sin(Math.sqrt(nx*nx+ny*ny)*7+t)+4)/8;
      const i=(y*sw+x)*4;
      d[i]=Math.round(bg.r * (1-v) + (ca.r * .4 + cb.r * .6) * v);
      d[i+1]=Math.round(bg.g * (1-v) + (ca.g * .4 + cb.g * .6) * v);
      d[i+2]=Math.round(bg.b * (1-v) + (ca.b * .4 + cb.b * .6) * v);
      d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texOcean(c2,w,h,t,pal){
  const tmp=mkPix((d,sw,sh)=>{
    const ca = hexToRgb(pal.a), cb = hexToRgb(pal.b), bg = hexToRgb(pal.bg);
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw,ny=y/sh;
      const v=(Math.sin(nx*6-t*1.2)*Math.cos(ny*4+t*.5)+Math.sin(nx*3+ny*5-t)*.5+2)/4;
      const i=(y*sw+x)*4;
      d[i]=Math.round(bg.r * (1-v) + ca.r * v);
      d[i+1]=Math.round(bg.g * (1-v) + ((ca.g + cb.g) * .5 + 30) * v);
      d[i+2]=Math.round(bg.b * (1-v) + cb.b * v);
      d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texSeaWaves(c2,w,h,t,pal,den=1){
  const bg=c2.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,mixColor(pal.bg,pal.a,.22));
  bg.addColorStop(.55,mixColor(pal.bg,pal.b,.32));
  bg.addColorStop(1,mixColor(pal.bg,'#000000',.28));
  c2.fillStyle=bg;
  c2.fillRect(0,0,w,h);

  c2.save();
  c2.globalCompositeOperation='screen';
  const bands=Math.max(1,Math.min(12,Math.round(Math.max(3,Math.min(5,Math.floor(h/95)))*den)));
  for(let i=0;i<bands;i++){
    const seed=i*18.41;
    const yBase=h*(.22+i*.18+rand01(seed)*.045);
    const amp=h*(.045+rand01(seed+1)*.028);
    const len=w*(.34+rand01(seed+2)*.18);
    const phase=t*(.9+rand01(seed+3)*.55)+seed;
    const water=c2.createLinearGradient(0,yBase-amp*1.6,0,yBase+amp*3.1);
    water.addColorStop(0,alpha(mixColor(pal.a,'#ffffff',.18),.28));
    water.addColorStop(.48,alpha(mixColor(pal.a,pal.b,.4),.5));
    water.addColorStop(1,alpha(pal.b,.18));

    c2.beginPath();
    for(let x=-12;x<=w+12;x+=8){
      const y=yBase+Math.sin(x/len*Math.PI*2+phase)*amp+Math.sin(x/len*Math.PI*4-phase*.65)*amp*.23;
      if(x===-12)c2.moveTo(x,y);
      else c2.lineTo(x,y);
    }
    c2.lineTo(w+12,h+20);
    c2.lineTo(-12,h+20);
    c2.closePath();
    c2.fillStyle=water;
    c2.fill();

    c2.strokeStyle=alpha(mixColor('#ffffff',pal.a,.16),.72);
    c2.lineWidth=Math.max(1.4,h*.006);
    c2.shadowColor=alpha(pal.a,.45);
    c2.shadowBlur=9;
    c2.beginPath();
    for(let x=-12;x<=w+12;x+=8){
      const y=yBase+Math.sin(x/len*Math.PI*2+phase)*amp+Math.sin(x/len*Math.PI*4-phase*.65)*amp*.23;
      if(x===-12)c2.moveTo(x,y);
      else c2.lineTo(x,y);
    }
    c2.stroke();

    const crests=Math.max(1,Math.round(Math.max(2,Math.floor(w/180))*den));
    for(let c=0;c<crests;c++){
      const x=((c+rand01(seed+c+5))/crests*w+t*(18+i*5))%(w+len*.2)-len*.1;
      const y=yBase+Math.sin(x/len*Math.PI*2+phase)*amp-amp*.15;
      const curl=len*(.08+rand01(seed+c+9)*.05);
      c2.strokeStyle=alpha('#ffffff',.32);
      c2.lineWidth=Math.max(1,h*.0035);
      c2.beginPath();
      c2.arc(x,y,curl,Math.PI*1.08,Math.PI*1.78);
      c2.stroke();
    }
  }
  c2.restore();
}

function texEyes(c2,w,h,t,pal,den=1){
  c2.fillStyle=pal.bg;
  c2.fillRect(0,0,w,h);

  const glow=c2.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,Math.max(w,h)*.62);
  glow.addColorStop(0,alpha(mixColor(pal.a,pal.b,.5),.18));
  glow.addColorStop(1,alpha(pal.bg,0));
  c2.fillStyle=glow;
  c2.fillRect(0,0,w,h);

  const count=Math.max(1,Math.min(18,Math.round(Math.max(3,Math.min(7,Math.floor((w*h)/34000)))*den)));
  for(let i=0;i<count;i++){
    const seed=i*53.83;
    const cycle=1.6+rand01(seed+5)*3.2;
    const rawPhase=t/cycle+rand01(seed+6);
    const phase=rawPhase%1;
    const placeSeed=seed+Math.floor(rawPhase+.5)*97.31;
    const cx=w*(.08+rand01(placeSeed)*.84);
    const cy=h*(.12+rand01(placeSeed+1)*.76);
    const base=Math.min(w,h)*(.12+rand01(placeSeed+2)*.18);
    const ew=Math.max(30,base*(.82+rand01(placeSeed+3)*.9));
    const eh=ew*(.32+rand01(placeSeed+4)*.16);
    const blink=Math.exp(-Math.pow((phase-.5)/.07,2));
    const open=Math.max(.045,1-blink);
    const lookX=Math.sin(t*(.85+rand01(seed+7)*.7)+placeSeed)*ew*.12;
    const lookY=Math.cos(t*(.72+rand01(seed+8)*.6)+placeSeed)*eh*.08*open;
    drawEye(c2,cx,cy,ew,eh,open,lookX,lookY,placeSeed,pal);
  }
}

function drawEye(c2,cx,cy,ew,eh,open,lookX,lookY,seed,pal){
  c2.save();
  c2.translate(cx,cy);
  c2.rotate((rand01(seed+8)-.5)*.28);

  c2.shadowColor=alpha(pal.a,.32);
  c2.shadowBlur=10;
  c2.fillStyle=alpha(mixColor(pal.a,'#ffffff',.72),.9);
  c2.beginPath();
  c2.ellipse(0,0,ew*.5,Math.max(1,eh*.5*open),0,0,Math.PI*2);
  c2.fill();
  c2.shadowBlur=0;

  c2.strokeStyle=alpha(mixColor(pal.b,'#000000',.18),.82);
  c2.lineWidth=Math.max(1,ew*.035);
  c2.beginPath();
  c2.ellipse(0,0,ew*.5,Math.max(1,eh*.5*open),0,0,Math.PI*2);
  c2.stroke();

  if(open>.16){
    const irisR=Math.min(ew,eh)*.26*Math.min(1,open*1.35);
    const ix=Math.max(-ew*.18,Math.min(ew*.18,lookX));
    const iy=Math.max(-eh*.08,Math.min(eh*.08,lookY));
    const iris=c2.createRadialGradient(ix-irisR*.25,iy-irisR*.32,irisR*.08,ix,iy,irisR);
    iris.addColorStop(0,mixColor('#ffffff',pal.a,.3));
    iris.addColorStop(.38,pal.a);
    iris.addColorStop(1,mixColor(pal.b,'#000000',.38));
    c2.fillStyle=iris;
    c2.beginPath();
    c2.arc(ix,iy,irisR,0,Math.PI*2);
    c2.fill();

    c2.fillStyle=alpha('#000000',.86);
    c2.beginPath();
    c2.arc(ix,iy,irisR*.58,0,Math.PI*2);
    c2.fill();

    c2.fillStyle=alpha('#ffffff',.72);
    c2.beginPath();
    c2.arc(ix-irisR*.28,iy-irisR*.32,Math.max(1,irisR*.14),0,Math.PI*2);
    c2.fill();
  }else{
    c2.strokeStyle=alpha(mixColor(pal.a,'#ffffff',.45),.42);
    c2.lineWidth=Math.max(1,ew*.025);
    c2.beginPath();
    c2.moveTo(-ew*.42,0);
    c2.quadraticCurveTo(0,eh*.08,ew*.42,0);
    c2.stroke();
  }

  c2.restore();
}

function texFireworks(c2,w,h,t,pal,den=1){
  const sky=c2.createLinearGradient(0,0,0,h);
  sky.addColorStop(0,mixColor(pal.bg,'#000000',.62));
  sky.addColorStop(.58,pal.bg);
  sky.addColorStop(1,mixColor(pal.bg,pal.b,.22));
  c2.fillStyle=sky;
  c2.fillRect(0,0,w,h);

  c2.save();
  c2.globalCompositeOperation='lighter';
  const rockets=Math.max(1,Math.min(14,Math.round(Math.max(3,Math.min(5,Math.floor(w/190)))*den)));
  for(let i=0;i<rockets;i++){
    const seed=i*31.71;
    const cycle=2.35+rand01(seed)*1.85;
    const phase=(t/cycle+rand01(seed+1))%1;
    const startX=w*(.08+rand01(seed+2)*.84);
    const drift=(rand01(seed+3)-.5)*w*.28;
    const arc=Math.sin(phase*Math.PI)*drift;
    const burstX=startX+drift;
    const burstY=h*(.12+rand01(seed+4)*.44);
    const x=startX+arc*Math.min(1,phase/.42);
    const y=h+(burstY-h)*Math.min(1,phase/.48);
    const hueMix=rand01(seed+5);
    const main=mixColor(pal.a,pal.b,hueMix);
    const hot=mixColor(main,'#ffffff',.44);

    if(phase<.48){
      const lift=phase/.48;
      const tailLen=h*(.08+rand01(seed+6)*.08);
      const tail=c2.createLinearGradient(x,y+tailLen,x,y);
      tail.addColorStop(0,alpha(main,0));
      tail.addColorStop(.35,alpha(main,.28));
      tail.addColorStop(1,alpha(hot,.95));
      c2.strokeStyle=tail;
      c2.lineWidth=Math.max(1.4,w*.004);
      c2.shadowColor=main;
      c2.shadowBlur=12;
      c2.beginPath();
      c2.moveTo(x-drift*.08,y+tailLen);
      c2.quadraticCurveTo(x-drift*.04,y+tailLen*.45,x,y);
      c2.stroke();
      c2.fillStyle=alpha('#ffffff',.55+lift*.35);
      c2.beginPath();
      c2.arc(x,y,Math.max(1.6,w*.004),0,Math.PI*2);
      c2.fill();
    }else{
      const life=(phase-.48)/.52;
      const ease=1-Math.pow(1-life,2);
      const count=Math.max(16,Math.round((64+Math.floor(rand01(seed+7)*54))*den));
      const radius=Math.min(w,h)*(.22+rand01(seed+8)*.2)*ease;
      const fade=Math.max(0,1-life);

      const flash=c2.createRadialGradient(burstX,burstY,0,burstX,burstY,radius*.68);
      flash.addColorStop(0,alpha('#ffffff',fade));
      flash.addColorStop(.18,alpha(hot,fade*.78));
      flash.addColorStop(1,alpha(main,0));
      c2.fillStyle=flash;
      c2.beginPath();
      c2.arc(burstX,burstY,radius*.68,0,Math.PI*2);
      c2.fill();

      const core=c2.createRadialGradient(burstX,burstY,0,burstX,burstY,radius*.32);
      core.addColorStop(0,alpha('#ffffff',fade*.95));
      core.addColorStop(.35,alpha(hot,fade*.72));
      core.addColorStop(1,alpha(main,0));
      c2.fillStyle=core;
      c2.beginPath();
      c2.arc(burstX,burstY,radius*.32,0,Math.PI*2);
      c2.fill();

      for(let p=0;p<count;p++){
        const ps=seed+p*9.13;
        const angle=Math.PI*2*(p/count+rand01(ps)*.08);
        const spread=.58+rand01(ps+1)*.7;
        const px=burstX+Math.cos(angle)*radius*spread+Math.sin(life*Math.PI+ps)*4;
        const py=burstY+Math.sin(angle)*radius*spread+life*life*h*.18;
        const spark=mixColor(main,p%3===0?'#ffffff':pal.a,rand01(ps+2)*.45);
        c2.fillStyle=alpha(spark,fade*(.72+rand01(ps+3)*.28));
        c2.shadowColor=spark;
        c2.shadowBlur=24*fade;
        c2.beginPath();
        c2.arc(px,py,Math.max(1.8,Math.min(w,h)*(.005+rand01(ps+4)*.007)*fade),0,Math.PI*2);
        c2.fill();

        if(p%2===0){
          c2.strokeStyle=alpha(spark,fade*.58);
          c2.lineWidth=Math.max(1.3,Math.min(w,h)*.0038);
          c2.beginPath();
          c2.moveTo(burstX+Math.cos(angle)*radius*spread*.46,burstY+Math.sin(angle)*radius*spread*.46);
          c2.lineTo(px,py);
          c2.stroke();
        }
      }

      c2.strokeStyle=alpha(hot,fade*.82);
      c2.lineWidth=Math.max(2,Math.min(w,h)*.009);
      c2.shadowColor=main;
      c2.shadowBlur=36*fade;
      c2.beginPath();
      c2.arc(burstX,burstY,radius*.82,0,Math.PI*2);
      c2.stroke();
    }
  }
  c2.restore();

  const haze=c2.createRadialGradient(w*.5,h*1.08,0,w*.5,h*1.08,h*.55);
  haze.addColorStop(0,alpha(mixColor(pal.a,pal.b,.5),.14));
  haze.addColorStop(1,alpha(pal.bg,0));
  c2.fillStyle=haze;
  c2.fillRect(0,0,w,h);
}

function texNeon(c2,w,h,t,pal){
  const gs=Math.max(28,w/18), pulse=.5+.5*Math.sin(t*2);
  c2.fillStyle=pal.bg; c2.fillRect(0,0,w,h);
  c2.strokeStyle=alpha(pal.a,.35+pulse*.4); c2.lineWidth=1;
  c2.shadowColor=pal.a; c2.shadowBlur=6+pulse*10;
  for(let x=0;x<w+gs;x+=gs){const ox=(x+t*40)%(w+gs)-gs;c2.beginPath();c2.moveTo(ox,0);c2.lineTo(ox,h);c2.stroke();}

        const hb=heights[b];
        minH=Math.min(minH,hb);
        maxH=Math.max(maxH,hb);
        sumH+=hb;
      }
      const avgH=sumH/span;
      const score=maxH*1.55+avgH*.25+(maxH-minH)*.85+Math.abs(s-targetBin)*binW*.02;
      if(score<bestScore){
        bestScore=score;
        startBin=s;
        support=maxH;
      }
    }
    const settledSupport=Math.min(support,Math.max(0,h-size*1.1));
    const impactY=Math.max(size*.75,h-settledSupport-size*.5);
    const impactT=spawnT+(impactY+size)/speed;
    const x=(startBin+span*.5)*binW;
    const stackHeight=size*(.32+rand01(seed+7)*.1);
    for(let b=startBin;b<startBin+span;b++){
      const center=startBin+span*.5-.5;
      const footprint=span<=1?1:1-Math.abs(b-center)/(span*.65);
      const packedHeight=settledSupport+stackHeight*Math.max(.62,footprint);
      heights[b]=Math.min(h,Math.max(heights[b],packedHeight));
    }
    if(localT<spawnT) continue;

    const drawCascadeShard=(x0,y0,rot0)=>{
      if(!flushing){
        drawShard(c2,x0,y0,size,shape,color,rot0);
        return;
      }
      const side=x0<w*.5?-1:1;
      const pushX=side*pushDist*(.55+rand01(seed+8)*.72)*flushEase;
      const pushY=pushDist*(rand01(seed+9)-.62)*flushEase-Math.sin(flushP*Math.PI)*h*.16;
      drawShard(c2,x0+pushX,y0+pushY,size,shape,color,rot0+side*flushEase*7.5);
    };

    if(flushing){
      drawCascadeShard(x,impactY,rotation);
      continue;
    }

    if(localT<impactT){
      const y=-size+(localT-spawnT)*speed;
      drawCascadeShard(x,y,rotation+(localT-spawnT)*1.7);
      continue;
    }

    drawCascadeShard(x,impactY,rotation);
  }
}

function texVideo(c2,w,h,polyId){
  try {
    const v = window.opener?.mappgState?.videos?.[polyId];
    if (v && v.readyState >= 2) {
      c2.drawImage(v,0,0,w,h);
      return;
    }
  } catch (e) {}
  c2.fillStyle='#111';
  c2.fillRect(0,0,w,h);
}

function drawMappedTexture(c2,p,bb,t){
  const rotation=(p.rotation||0)*Math.PI/180;
  const tiltX=(p.tiltX||0)*Math.PI/180;
  const tiltY=(p.tiltY||0)*Math.PI/180;
  const scale=Math.max(0.1,p.scale??1);
  const offsetX=(p.offsetX||0)*bb.w;
  const offsetY=(p.offsetY||0)*bb.h;
  const tw=bb.w/scale;
  const th=bb.h/scale;
  const planeScaleX=Math.max(0.2,Math.cos(tiltY));
  const planeScaleY=Math.max(0.2,Math.cos(tiltX));
  const shearX=Math.sin(tiltY)*0.75;
  const shearY=Math.sin(tiltX)*0.75;

  c2.save();
  c2.translate(bb.x + bb.w/2 + offsetX, bb.y + bb.h/2 + offsetY);
  c2.rotate(rotation);
  c2.transform(planeScaleX, shearY, shearX, planeScaleY, 0, 0);
  c2.translate(-tw/2, -th/2);
  drawTex(c2,p.texture,tw,th,t*(p.speed??1),p.id,p);
  c2.restore();
}

// ─── Helpers ─────────────────────────────────────────────────
function cubicAt(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

function curveControls(pts, i) {
  const n = pts.length;
  const p0 = pts[(i - 1 + n) % n];
  const p1 = pts[i];
  const p2 = pts[(i + 1) % n];
  const p3 = pts[(i + 2) % n];
  return {
    p1,
    p2,
    cp1: [p1[0] + (p2[0] - p0[0]) / 6, p1[1] + (p2[1] - p0[1]) / 6],
    cp2: [p2[0] - (p3[0] - p1[0]) / 6, p2[1] - (p3[1] - p1[1]) / 6],
  };
}

function normalizeSegmentCurves(p) {
  if (!p) return [];
  if (Array.isArray(p.segmentCurves) && p.segmentCurves.length === p.points.length) return p.segmentCurves;
  const legacyCurve = !!p.curved;
  p.segmentCurves = Array(p.points.length).fill(legacyCurve);
  delete p.curved;
  return p.segmentCurves;
}

function sanitizeBezier(b) {
  if (!b || !Array.isArray(b.cp1) || !Array.isArray(b.cp2)) return null;
  const cp1 = [Number(b.cp1[0]), Number(b.cp1[1])];
  const cp2 = [Number(b.cp2[0]), Number(b.cp2[1])];
  return cp1.every(Number.isFinite) && cp2.every(Number.isFinite) ? { cp1, cp2 } : null;
}

function normalizePolyGeometry(p) {
  if (!p) return p;
  normalizeSegmentCurves(p);
  if (!Array.isArray(p.segmentBezier) || p.segmentBezier.length !== p.points.length) {
    p.segmentBezier = p.points.map((_, i) => sanitizeBezier(p.segmentBezier?.[i]));
  } else {
    p.segmentBezier = p.segmentBezier.map(sanitizeBezier);
  }
  return p;
}

function curveSegmentFromArrays(pts, i, segmentBezier=[]) {
  const explicit = sanitizeBezier(segmentBezier?.[i]);
  if (explicit) {
    return {
      p1: pts[i],
      p2: pts[(i + 1) % pts.length],
      cp1: explicit.cp1,
      cp2: explicit.cp2,
    };
  }
  return curveControls(pts, i);
}

function tracePolyPath(c2, pts, segmentCurves=[], segmentBezier=[]) {
  if (!pts.length) return;
  c2.moveTo(pts[0][0], pts[0][1]);
  const curves = Array.isArray(segmentCurves) ? segmentCurves : [];
  for (let i=0;i<pts.length;i++) {
    if (curves[i] && pts.length >= 3) {
      const seg = curveSegmentFromArrays(pts, i, segmentBezier);
      c2.bezierCurveTo(seg.cp1[0], seg.cp1[1], seg.cp2[0], seg.cp2[1], seg.p2[0], seg.p2[1]);
    } else {
      const next = pts[(i + 1) % pts.length];
      c2.lineTo(next[0], next[1]);
    }
  }
  c2.closePath();
}

function samplePathSegments(pts, segmentCurves=[], steps=12, segmentBezier=[]) {
  if (pts.length < 2) return [];
  const curves = Array.isArray(segmentCurves) ? segmentCurves : [];
  const out = [];
  for (let i=0;i<pts.length;i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    if (curves[i] && pts.length >= 3) {
      const seg = curveSegmentFromArrays(pts, i, segmentBezier);
      let prev = seg.p1;
      for (let s=1;s<=steps;s++) {
        const t = s / steps;
        const next = [
          cubicAt(seg.p1[0], seg.cp1[0], seg.cp2[0], seg.p2[0], t),
          cubicAt(seg.p1[1], seg.cp1[1], seg.cp2[1], seg.p2[1], t),
        ];
        out.push({ a: prev, b: next, edgeIdx: i });
        prev = next;
      }
    } else {
      out.push({ a, b, edgeIdx: i });
    }
  }
  return out;
}

function samplePolyPoints(pts, segmentCurves=[], steps=12, segmentBezier=[]) {
  const segs = samplePathSegments(pts, segmentCurves, steps, segmentBezier);
  return segs.length ? segs.map(seg => seg.a) : pts;
}

function bbox(pts, segmentCurves=[], segmentBezier=[]){
  pts = samplePolyPoints(pts, segmentCurves, 12, segmentBezier);
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const x=Math.min(...xs),y=Math.min(...ys);
  return{x,y,w:Math.max(1,Math.max(...xs)-x),h:Math.max(1,Math.max(...ys)-y)};
}

// ─── Render loop ─────────────────────────────────────────────
const off=document.createElement('canvas');
const octx=off.getContext('2d');

function render(ts){
  const t=ts*.001;
  const cw=canvas.width, ch=canvas.height;
  if(off.width!==cw||off.height!==ch){off.width=cw;off.height=ch;}

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,cw,ch);

  polys.forEach(p=>{
    if(!p.visible||p.points.length<3) return;
    normalizePolyGeometry(p);
    const curves = p.segmentCurves;
    const bb=bbox(p.points, curves, p.segmentBezier);

    octx.clearRect(0,0,cw,ch);
    octx.save();
    octx.beginPath();
    tracePolyPath(octx, p.points, curves, p.segmentBezier);
    octx.clip();
    drawMappedTexture(octx,p,bb,t);
    octx.restore();

    ctx.save();
    ctx.globalAlpha=p.opacity;
    ctx.globalCompositeOperation=p.blend;
    ctx.drawImage(off,0,0);
    ctx.restore();
  });

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
