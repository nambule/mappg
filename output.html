<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAPPR — Output</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let polys = [];
let bc = null;
const DEFAULT_TEXTURE_COLORS = {
  colorA: '#00e5ff',
  colorB: '#a855f7',
  colorBg: '#05070c',
};

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Double-click → fullscreen
document.addEventListener('dblclick', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});

// ─── Receive data from editor ────────────────────────────────
// Called directly by the editor via outWin.applyUpdate(data)
function applyUpdate(data) {
  if (Array.isArray(data)) polys = data;
}

// BroadcastChannel path for same-origin tabs/windows
try {
  bc = new BroadcastChannel('videomapping');
  bc.onmessage = ev => {
    if (ev.data?.type === 'update' && Array.isArray(ev.data.polys)) {
      polys = ev.data.polys;
    }
  };
  bc.postMessage({ type:'ready' });
} catch (e) {}

// localStorage fallback for browsers/setups where direct calls or channels fail
function readStoredState() {
  try {
    const raw = localStorage.getItem('mappr_state');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data)) polys = data;
  } catch (e) {}
}

readStoredState();

window.addEventListener('storage', e => {
  if (e.key === 'mappr_state') readStoredState();
});

// Signal readiness for setups that rely on storage events
try { localStorage.setItem('mappr_ready', String(Date.now())); } catch (e) {}

// Fallback: poll shared opener state directly every 300ms
// (works for file:// where messaging APIs may be restricted)
setInterval(() => {
  try {
    const state = window.opener?.mapprState;
    if (state?.polys) {
      polys = state.polys.map(p => ({
        id: p.id, points: p.points, texture: p.texture,
        opacity: p.opacity, speed: p.speed, blend: p.blend, segmentCurves: p.segmentCurves,
        colorA: p.colorA, colorB: p.colorB, colorBg: p.colorBg,
        rotation: p.rotation, tiltX: p.tiltX, tiltY: p.tiltY, scale: p.scale,
        offsetX: p.offsetX, offsetY: p.offsetY,
        visible: p.visible, color: p.color,
      }));
    }
  } catch(e) {}
}, 300);

window.addEventListener('beforeunload', () => {
  try { bc?.postMessage({ type:'closed' }); } catch (e) {}
  try { localStorage.setItem('mappr_closed', String(Date.now())); } catch (e) {}
});

// ─── Texture renderers ───────────────────────────────────────
function texturePalette(p) {
  return {
    a: p?.colorA || DEFAULT_TEXTURE_COLORS.colorA,
    b: p?.colorB || DEFAULT_TEXTURE_COLORS.colorB,
    bg: p?.colorBg || DEFAULT_TEXTURE_COLORS.colorBg,
  };
}

function hexToRgb(hex) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '');
  return m ? { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) } : { r:0,g:0,b:0 };
}

function mixColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  return `rgb(${Math.round(a.r + (b.r - a.r) * t)}, ${Math.round(a.g + (b.g - a.g) * t)}, ${Math.round(a.b + (b.b - a.b) * t)})`;
}

function alpha(hex, a) {
  const c = hexToRgb(hex);
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

function drawTex(c2, id, w, h, t, polyId, poly) {
  if (w<=0||h<=0) return;
  const pal = texturePalette(poly);
  switch(id) {
    case 'lava':    texLava(c2,w,h,t,pal);    break;
    case 'ocean':   texOcean(c2,w,h,t);   break;
    case 'neon':    texNeon(c2,w,h,t,pal);    break;
    case 'wire':    texWire(c2,w,h,t,pal);    break;
    case 'matrix':  texMatrix(c2,w,h,t);  break;
    case 'checker': texChecker(c2,w,h,t,pal); break;
    case 'fire':    texFire(c2,w,h,t);    break;
    case 'noise':   texNoise(c2,w,h,t);   break;
    case 'rainbow': texRainbow(c2,w,h,t,pal); break;
    case 'stars':   texStars(c2,w,h,t,pal);   break;
    case 'sweep':   texSweep(c2,w,h,t,pal);   break;
    case 'plasma':  texPlasma(c2,w,h,t);  break;
    case 'radar':   texRadar(c2,w,h,t);   break;
    case 'stripes': texStripes(c2,w,h,t); break;
    case 'marble':  texMarble(c2,w,h,t);  break;
    case 'rings':   texRings(c2,w,h,t);   break;
    case 'halftone': texHalftone(c2,w,h,t); break;
    case 'chevrons': texChevrons(c2,w,h,t); break;
    case 'beams':   texBeams(c2,w,h,t);   break;
    case 'video':   texVideo(c2,w,h,polyId); break;
  }
}

function mkPix(fn, w, h, scale) {
  const sw=Math.max(1,Math.ceil(w/scale)), sh=Math.max(1,Math.ceil(h/scale));
  const id=new ImageData(sw,sh); fn(id.data,sw,sh);
  const t=document.createElement('canvas'); t.width=sw; t.height=sh;
  t.getContext('2d').putImageData(id,0,0); return t;
}

function texLava(c2,w,h,t,pal){
  const tmp=mkPix((d,sw,sh)=>{
    const ca = hexToRgb(pal.a), cb = hexToRgb(pal.b), bg = hexToRgb(pal.bg);
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw,ny=y/sh;
      let v=(Math.sin(nx*8+t)+Math.sin(ny*6+t*1.3)+Math.sin((nx+ny)*5+t*.7)+Math.sin(Math.sqrt(nx*nx+ny*ny)*7+t)+4)/8;
      const i=(y*sw+x)*4;
      d[i]=Math.round(bg.r * (1-v) + (ca.r * .4 + cb.r * .6) * v);
      d[i+1]=Math.round(bg.g * (1-v) + (ca.g * .4 + cb.g * .6) * v);
      d[i+2]=Math.round(bg.b * (1-v) + (ca.b * .4 + cb.b * .6) * v);
      d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texOcean(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw,ny=y/sh;
      const v=(Math.sin(nx*6-t*1.2)*Math.cos(ny*4+t*.5)+Math.sin(nx*3+ny*5-t)*.5+2)/4;
      const i=(y*sw+x)*4; d[i]=0;d[i+1]=Math.min(255,v*120+60);d[i+2]=Math.min(255,v*200+80);d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texNeon(c2,w,h,t,pal){
  const gs=Math.max(28,w/18), pulse=.5+.5*Math.sin(t*2);
  c2.fillStyle=pal.bg; c2.fillRect(0,0,w,h);
  c2.strokeStyle=alpha(pal.a,.35+pulse*.4); c2.lineWidth=1;
  c2.shadowColor=pal.a; c2.shadowBlur=6+pulse*10;
  for(let x=0;x<w+gs;x+=gs){const ox=(x+t*40)%(w+gs)-gs;c2.beginPath();c2.moveTo(ox,0);c2.lineTo(ox,h);c2.stroke();}
  for(let y=0;y<h+gs;y+=gs){const oy=(y+t*20)%(h+gs)-gs;c2.beginPath();c2.moveTo(0,oy);c2.lineTo(w,oy);c2.stroke();}
  c2.shadowBlur=0;
  const g=c2.createLinearGradient(0,h*.45,0,h);
  g.addColorStop(0,alpha(pal.b,.35+pulse*.25));g.addColorStop(1,alpha(pal.bg,0));
  c2.fillStyle=g;c2.fillRect(0,h*.45,w,h);
}

function texWire(c2,w,h,t,pal){
  const step=Math.max(24,w/14);
  c2.fillStyle=pal.bg;
  c2.fillRect(0,0,w,h);
  c2.strokeStyle=alpha(pal.a,.45);
  c2.lineWidth=1;
  for(let y=-h;y<h*1.5;y+=step){
    const yy=y+(t*40%step);
    c2.beginPath();
    c2.moveTo(0,yy);
    c2.lineTo(w,yy-h*.18);
    c2.stroke();
  }
  for(let x=-w;x<w*2;x+=step){
    const xx=x+(t*65%step);
    c2.beginPath();
    c2.moveTo(xx,h);
    c2.lineTo(w/2 + (xx-w/2)*.18,h*.22);
    c2.stroke();
  }
}

function texMatrix(c2,w,h,t){
  c2.fillStyle='#020502';
  c2.fillRect(0,0,w,h);
  const cols=Math.max(8,Math.floor(w/18));
  const colW=w/cols;
  c2.font=`${Math.max(10,colW*.85)}px monospace`;
  c2.textBaseline='top';
  for(let i=0;i<cols;i++){
    const x=i*colW;
    const speed=30+(i%7)*12;
    const offset=(t*speed*22+i*47)%(h+140);
    for(let y=-120;y<h+40;y+=18){
      const yy=y+offset;
      const code=0x30A0+((i*17+y/18)%96);
      const glow=y>60&&y<120?1:.45;
      c2.fillStyle=`rgba(110,255,140,${glow})`;
      c2.fillText(String.fromCharCode(code),x,yy);
    }
  }
}

function texChecker(c2,w,h,t,pal){
  const size=Math.max(20,w/10);
  const shift=(t*35)%(size*2);
  for(let y=-size;y<h+size;y+=size){
    for(let x=-size;x<w+size;x+=size){
      const on=((Math.floor((x+shift)/size)+Math.floor(y/size))%2)===0;
      c2.fillStyle=on?pal.a:pal.bg;
      c2.fillRect(x,y,size,size);
    }
  }
}

function texFire(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const ny=1-y/sh,nx=x/sw,fl=Math.sin(nx*10+t*4)*.12+Math.sin(nx*5-t*3)*.09;
      const heat=Math.max(0,Math.min(1,ny+fl));
      let r=0,g=0,b=0;
      if(heat>.9){r=255;g=255;b=Math.round((heat-.9)*2550);}
      else if(heat>.6){r=255;g=Math.round((heat-.6)/.3*200);}
      else if(heat>.3){r=Math.round((heat-.3)/.3*255);}
      const i=(y*sw+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;
    }
  },w,h,4);
  c2.drawImage(tmp,0,0,w,h);
}

function texNoise(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    const s=Math.floor(t*30);
    for(let i=0;i<d.length;i+=4){const v=Math.abs((Math.sin(i*127.1+s)*43758.5)%1)*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  },w,h,3);
  c2.imageSmoothingEnabled=false; c2.drawImage(tmp,0,0,w,h); c2.imageSmoothingEnabled=true;
}

function texRainbow(c2,w,h,t,pal){
  const g=c2.createLinearGradient(0,0,w,h);
  g.addColorStop(0,pal.a);
  g.addColorStop(.5,mixColor(pal.a,pal.b,.5));
  g.addColorStop(1,pal.b);
  c2.fillStyle=g; c2.fillRect(0,0,w,h);
}

function texStars(c2,w,h,t,pal){
  c2.fillStyle=pal.bg; c2.fillRect(0,0,w,h);
  for(let i=0;i<250;i++){
    const s=i*1234.5;
    const sx=((Math.sin(s)*.5+.5)*w*5+t*(18+i%25)*1.5)%w;
    const sy=(Math.cos(s*1.3)*.5+.5)*h;
    c2.fillStyle=alpha(i%2 ? pal.a : pal.b,.4+.6*Math.abs(Math.sin(t*1.5+i)));
    c2.beginPath();c2.arc(sx,sy,.4+(i%5)*.5,0,Math.PI*2);c2.fill();
  }
}

function texSweep(c2,w,h,t,pal){
  const x=(t*.28%1)*(w+200)-100;
  const bg=c2.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,pal.bg);bg.addColorStop(1,mixColor(pal.bg,pal.b,.35));
  c2.fillStyle=bg;c2.fillRect(0,0,w,h);
  const g=c2.createLinearGradient(x-120,0,x+120,0);
  g.addColorStop(0,alpha(pal.b,0));g.addColorStop(.3,alpha(pal.b,.85));
  g.addColorStop(.5,'rgba(255,255,255,1)');g.addColorStop(.7,alpha(pal.a,.85));g.addColorStop(1,alpha(pal.a,0));
  c2.fillStyle=g;c2.fillRect(0,0,w,h);
}

function texPlasma(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw-.5, ny=y/sh-.5;
      const r=Math.hypot(nx,ny);
      const v=.5+.5*Math.sin(18*r-t*4+Math.sin((nx+ny)*8+t));
      const i=(y*sw+x)*4;
      d[i]=120+v*120;
      d[i+1]=40+Math.sin(v*6+t)*50+v*90;
      d[i+2]=180+Math.cos(v*5-t)*60;
      d[i+3]=255;
    }
  },w,h,3);
  c2.drawImage(tmp,0,0,w,h);
}

function texRadar(c2,w,h,t){
  const cx=w/2, cy=h/2, r=Math.max(w,h)*0.55;
  c2.fillStyle='#021106';
  c2.fillRect(0,0,w,h);
  c2.strokeStyle='rgba(30,255,120,.18)';
  c2.lineWidth=1;
  for(let i=1;i<=4;i++){
    c2.beginPath();
    c2.arc(cx,cy,r*i/4,0,Math.PI*2);
    c2.stroke();
  }
  c2.beginPath(); c2.moveTo(cx,0); c2.lineTo(cx,h); c2.stroke();
  c2.beginPath(); c2.moveTo(0,cy); c2.lineTo(w,cy); c2.stroke();
  const a=t*1.4;
  const sweep=c2.createRadialGradient(cx,cy,0,cx,cy,r);
  sweep.addColorStop(0,'rgba(90,255,170,.28)');
  sweep.addColorStop(1,'rgba(90,255,170,0)');
  c2.save();
  c2.translate(cx,cy);
  c2.rotate(a);
  c2.beginPath();
  c2.moveTo(0,0);
  c2.arc(0,0,r,-.22,.22);
  c2.closePath();
  c2.fillStyle=sweep;
  c2.fill();
  c2.restore();
}

function texStripes(c2,w,h,t){
  c2.fillStyle='#0d1117';
  c2.fillRect(0,0,w,h);
  const stripeW=Math.max(18,w/10);
  for(let i=-2;i<Math.ceil(w/stripeW)+4;i++){
    const x=(i*stripeW + (t*70)%stripeW) - stripeW;
    c2.fillStyle=i%2===0 ? '#ff8a00' : '#ffd166';
    c2.beginPath();
    c2.moveTo(x,0);
    c2.lineTo(x+stripeW*.55,0);
    c2.lineTo(x+stripeW*1.35,h);
    c2.lineTo(x+stripeW*.8,h);
    c2.closePath();
    c2.fill();
  }
}

function texMarble(c2,w,h,t){
  const tmp=mkPix((d,sw,sh)=>{
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const nx=x/sw, ny=y/sh;
      const vein=Math.sin((nx*10+ny*14+t*.35) + (Math.sin(nx*8+t*.35)+Math.sin(ny*6+t*.45)+Math.sin((nx+ny)*5+t*.2))*1.8);
      const shade=185 + vein*55;
      const i=(y*sw+x)*4;
      d[i]=shade;
      d[i+1]=shade-10;
      d[i+2]=shade+8;
      d[i+3]=255;
    }
  },w,h,3);
  c2.drawImage(tmp,0,0,w,h);
}

function texRings(c2,w,h,t){
  const cx=w/2, cy=h/2;
  c2.fillStyle='#05030a';
  c2.fillRect(0,0,w,h);
  for(let i=0;i<10;i++){
    const r=(Math.min(w,h)*.08)+i*Math.min(w,h)*.075+Math.sin(t*2+i)*6;
    c2.beginPath();
    c2.arc(cx,cy,r,0,Math.PI*2);
    c2.strokeStyle=`hsla(${(t*80+i*28)%360},100%,70%,0.75)`;
    c2.lineWidth=4-i*.22;
    c2.stroke();
  }
}

function texHalftone(c2,w,h,t){
  const dot=Math.max(10,w/18);
  const bg=c2.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#111827');
  bg.addColorStop(1,'#3b0f54');
  c2.fillStyle=bg;
  c2.fillRect(0,0,w,h);
  for(let y=0;y<h+dot;y+=dot){
    for(let x=0;x<w+dot;x+=dot){
      const v=.5+.5*Math.sin(x*.035+y*.045+t*3);
      const r=v*dot*.42;
      c2.beginPath();
      c2.arc(x+(y/dot%2)*dot*.5,y,r,0,Math.PI*2);
      c2.fillStyle='rgba(255,245,180,0.9)';
      c2.fill();
    }
  }
}

function texChevrons(c2,w,h,t){
  c2.fillStyle='#0a0d12';
  c2.fillRect(0,0,w,h);
  const band=Math.max(24,h/9);
  for(let i=-2;i<h/band+4;i++){
    const y=i*band+(t*45%band)-band;
    c2.fillStyle=i%2===0?'#00d1ff':'#ff5f3d';
    c2.beginPath();
    c2.moveTo(0,y+band*.5);
    c2.lineTo(w*.35,y);
    c2.lineTo(w,y+band*.5);
    c2.lineTo(w*.35,y+band);
    c2.closePath();
    c2.fill();
  }
}

function texBeams(c2,w,h,t){
  c2.fillStyle='#060606';
  c2.fillRect(0,0,w,h);
  const cx=w/2, cy=h/2;
  for(let i=0;i<18;i++){
    const a=(Math.PI*2/18)*i+t*.45;
    const spread=.08+(i%3)*.02;
    const g=c2.createLinearGradient(cx,cy,cx+Math.cos(a)*w,cy+Math.sin(a)*h);
    g.addColorStop(0,`hsla(${(i*20+t*50)%360},100%,70%,0.9)`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    c2.fillStyle=g;
    c2.beginPath();
    c2.moveTo(cx,cy);
    c2.lineTo(cx+Math.cos(a-spread)*w*1.2,cy+Math.sin(a-spread)*h*1.2);
    c2.lineTo(cx+Math.cos(a+spread)*w*1.2,cy+Math.sin(a+spread)*h*1.2);
    c2.closePath();
    c2.fill();
  }
}

function texVideo(c2,w,h,polyId){
  try {
    const v = window.opener?.mapprState?.videos?.[polyId];
    if (v && v.readyState >= 2) {
      c2.drawImage(v,0,0,w,h);
      return;
    }
  } catch (e) {}
  c2.fillStyle='#111';
  c2.fillRect(0,0,w,h);
}

function drawMappedTexture(c2,p,bb,t){
  const rotation=(p.rotation||0)*Math.PI/180;
  const tiltX=(p.tiltX||0)*Math.PI/180;
  const tiltY=(p.tiltY||0)*Math.PI/180;
  const scale=Math.max(0.1,p.scale??1);
  const offsetX=(p.offsetX||0)*bb.w;
  const offsetY=(p.offsetY||0)*bb.h;
  const tw=bb.w/scale;
  const th=bb.h/scale;
  const planeScaleX=Math.max(0.2,Math.cos(tiltY));
  const planeScaleY=Math.max(0.2,Math.cos(tiltX));
  const shearX=Math.sin(tiltY)*0.75;
  const shearY=Math.sin(tiltX)*0.75;

  c2.save();
  c2.translate(bb.x + bb.w/2 + offsetX, bb.y + bb.h/2 + offsetY);
  c2.rotate(rotation);
  c2.transform(planeScaleX, shearY, shearX, planeScaleY, 0, 0);
  c2.translate(-tw/2, -th/2);
  drawTex(c2,p.texture,tw,th,t*(p.speed??1),p.id,p);
  c2.restore();
}

// ─── Helpers ─────────────────────────────────────────────────
function cubicAt(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

function curveControls(pts, i) {
  const n = pts.length;
  const p0 = pts[(i - 1 + n) % n];
  const p1 = pts[i];
  const p2 = pts[(i + 1) % n];
  const p3 = pts[(i + 2) % n];
  return {
    p1,
    p2,
    cp1: [p1[0] + (p2[0] - p0[0]) / 6, p1[1] + (p2[1] - p0[1]) / 6],
    cp2: [p2[0] - (p3[0] - p1[0]) / 6, p2[1] - (p3[1] - p1[1]) / 6],
  };
}

function normalizeSegmentCurves(p) {
  if (!p) return [];
  if (Array.isArray(p.segmentCurves) && p.segmentCurves.length === p.points.length) return p.segmentCurves;
  const legacyCurve = !!p.curved;
  p.segmentCurves = Array(p.points.length).fill(legacyCurve);
  delete p.curved;
  return p.segmentCurves;
}

function tracePolyPath(c2, pts, segmentCurves=[]) {
  if (!pts.length) return;
  c2.moveTo(pts[0][0], pts[0][1]);
  const curves = Array.isArray(segmentCurves) ? segmentCurves : [];
  for (let i=0;i<pts.length;i++) {
    if (curves[i] && pts.length >= 3) {
      const seg = curveControls(pts, i);
      c2.bezierCurveTo(seg.cp1[0], seg.cp1[1], seg.cp2[0], seg.cp2[1], seg.p2[0], seg.p2[1]);
    } else {
      const next = pts[(i + 1) % pts.length];
      c2.lineTo(next[0], next[1]);
    }
  }
  c2.closePath();
}

function samplePathSegments(pts, segmentCurves=[], steps=12) {
  if (pts.length < 2) return [];
  const curves = Array.isArray(segmentCurves) ? segmentCurves : [];
  const out = [];
  for (let i=0;i<pts.length;i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    if (curves[i] && pts.length >= 3) {
      const seg = curveControls(pts, i);
      let prev = seg.p1;
      for (let s=1;s<=steps;s++) {
        const t = s / steps;
        const next = [
          cubicAt(seg.p1[0], seg.cp1[0], seg.cp2[0], seg.p2[0], t),
          cubicAt(seg.p1[1], seg.cp1[1], seg.cp2[1], seg.p2[1], t),
        ];
        out.push({ a: prev, b: next, edgeIdx: i });
        prev = next;
      }
    } else {
      out.push({ a, b, edgeIdx: i });
    }
  }
  return out;
}

function samplePolyPoints(pts, segmentCurves=[], steps=12) {
  const segs = samplePathSegments(pts, segmentCurves, steps);
  return segs.length ? segs.map(seg => seg.a) : pts;
}

function bbox(pts, segmentCurves=[]){
  pts = samplePolyPoints(pts, segmentCurves);
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const x=Math.min(...xs),y=Math.min(...ys);
  return{x,y,w:Math.max(1,Math.max(...xs)-x),h:Math.max(1,Math.max(...ys)-y)};
}

// ─── Render loop ─────────────────────────────────────────────
const off=document.createElement('canvas');
const octx=off.getContext('2d');

function render(ts){
  const t=ts*.001;
  const cw=canvas.width, ch=canvas.height;
  if(off.width!==cw||off.height!==ch){off.width=cw;off.height=ch;}

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,cw,ch);

  polys.forEach(p=>{
    if(!p.visible||p.points.length<3) return;
    const curves = normalizeSegmentCurves(p);
    const bb=bbox(p.points, curves);

    octx.clearRect(0,0,cw,ch);
    octx.save();
    octx.beginPath();
    tracePolyPath(octx, p.points, curves);
    octx.clip();
    drawMappedTexture(octx,p,bb,t);
    octx.restore();

    ctx.save();
    ctx.globalAlpha=p.opacity;
    ctx.globalCompositeOperation=p.blend;
    ctx.drawImage(off,0,0);
    ctx.restore();
  });

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
